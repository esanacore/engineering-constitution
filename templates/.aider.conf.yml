# Eric's Engineering Constitution — Aider configuration.
# Add project-specific settings below.
# See constitution/INTEGRATION.md for override guidance.

# Follow the constitution workflow; never auto-commit.
auto-commits: false

# Load constitution files as read-only context on every session. Includes
# docs/SESSION_PLAN.md so a previous interrupted session's plan is always
# visible; write your own plan there before implementing, and clear or
# archive it when the session completes.
read:
  - AGENTS.md
  - constitution/CONSTITUTION.md
  - constitution/AI_WORKFLOW.md
  - README.md
  - TODO.md
  - CHANGELOG.md
  - docs/SESSION_PLAN.md
