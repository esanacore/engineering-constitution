name: Constitution Secrets Sweep

# Sweeps tracked and untracked-but-not-gitignored files for secrets that
# should never reach a remote, via the constitution's
# scripts/check_secrets.sh, which ships in the pinned `constitution/`
# submodule.
#
# A real hit (a credential-shaped filename, or a high-confidence content
# match such as an AWS access key or a PEM private key block) ALWAYS fails
# this job, with or without --strict. --strict only governs the separate
# .gitignore-coverage recommendation, which warns by default so adopting this
# template doesn't instantly redden a repository that simply hasn't added
# every recommended .gitignore pattern yet.
#
# This is a zero-dependency baseline (bash + git only). Consider a dedicated
# scanner (gitleaks, trufflehog) for deeper coverage if this project handles
# unusually sensitive credentials.

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "41 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository with submodules and full history
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Confirm constitution submodule is present
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -e constitution/scripts/check_secrets.sh ]; then
            echo "::error::No 'constitution/' submodule found (or it is too old to ship the secrets sweep). This repository does not appear to adopt Eric's Engineering Constitution."
            exit 1
          fi

      - name: Sweep for secrets
        shell: bash
        run: bash constitution/scripts/check_secrets.sh .
