name: Wiki Sync

# Publishes this repository's authored wiki/ pages to its built-in GitHub wiki
# (<repo>.wiki.git) on every push to the default branch, so the rendered wiki
# is never stale relative to its reviewed source. This is the constitution
# dogfooding the publish-on-merge model it ships to adopters as
# templates/.github/workflows/constitution-wiki.yml (see ADR-0001).
#
# PREREQUISITE: the GitHub wiki must be enabled and initialized once by hand
# (Settings -> Features -> Wikis, then create the Home page in the UI) before
# <repo>.wiki.git exists and can be pushed to.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki-sync.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish wiki/ to the GitHub wiki
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ ! -d wiki ] || [ -z "$(ls -A wiki 2>/dev/null)" ]; then
            echo "No wiki/ content to publish; nothing to do."
            exit 0
          fi

          wiki_remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          if ! git clone --depth 1 "$wiki_remote" wiki-publish 2>/dev/null; then
            echo "::error::Could not clone ${GITHUB_REPOSITORY}.wiki.git. Enable the wiki (Settings -> Features -> Wikis) and create the Home page once in the UI to initialize it, then re-run."
            exit 1
          fi

          rsync -a --delete --exclude '.git' wiki/ wiki-publish/

          cd wiki-publish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date; nothing to publish."
            exit 0
          fi
          git commit -m "Sync wiki from ${GITHUB_SHA}"
          git push
          echo "Published wiki/ to ${GITHUB_REPOSITORY}.wiki.git"
